<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="从沙子到芯片的半导体制造总流程">
  <defs>
    <style>
      .bg{fill:#f7fafc}.box{fill:#fff;stroke:#2f3a4a;stroke-width:2;rx:16}.box2{fill:#eef6ff;stroke:#2764a5;stroke-width:2;rx:16}.box3{fill:#f3fbf5;stroke:#2e7d4f;stroke-width:2;rx:16}.box4{fill:#fff7e8;stroke:#a56b19;stroke-width:2;rx:16}
      .txt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif;fill:#111827;font-size:22px;font-weight:700}.sub{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif;fill:#374151;font-size:16px}
      .arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="520"/>
  <text class="txt" x="44" y="56" font-size="30">半导体制造主线：从 SiO2 到可工作的芯片</text>
  <text class="sub" x="44" y="86">前端制造不是一条线性流水线，而是“沉积/生长 → 光刻 → 刻蚀/改性 → 清洗/检测”的循环，重复几十到上百层。</text>

  <rect class="box4" x="45" y="145" width="170" height="110"/>
  <text class="txt" x="82" y="186">石英砂</text>
  <text class="sub" x="68" y="216">SiO2 原料</text>

  <path class="arrow" d="M215 200 H276"/>
  <rect class="box4" x="282" y="145" width="185" height="110"/>
  <text class="txt" x="315" y="183">高纯硅</text>
  <text class="sub" x="304" y="213">冶金硅 → 多晶硅</text>
  <text class="sub" x="319" y="237">ppb 级杂质控制</text>

  <path class="arrow" d="M467 200 H528"/>
  <rect class="box2" x="535" y="145" width="190" height="110"/>
  <text class="txt" x="575" y="183">单晶棒</text>
  <text class="sub" x="565" y="213">CZ / FZ 拉晶</text>
  <text class="sub" x="564" y="237">晶向、掺杂、电阻率</text>

  <path class="arrow" d="M725 200 H786"/>
  <rect class="box2" x="793" y="145" width="190" height="110"/>
  <text class="txt" x="834" y="183">晶圆</text>
  <text class="sub" x="822" y="213">切片、倒角、研磨</text>
  <text class="sub" x="820" y="237">抛光、清洗、检测</text>

  <path class="arrow" d="M983 200 H1044"/>
  <rect class="box3" x="1051" y="145" width="185" height="110"/>
  <text class="txt" x="1083" y="183">前端制造</text>
  <text class="sub" x="1072" y="213">晶体管 + 互连</text>
  <text class="sub" x="1081" y="237">FEOL / BEOL</text>

  <path class="arrow" d="M1143 255 V313"/>
  <rect class="box3" x="960" y="333" width="275" height="112"/>
  <text class="txt" x="1004" y="373">测试与封装</text>
  <text class="sub" x="992" y="403">晶圆测试、切割、贴片</text>
  <text class="sub" x="992" y="427">键合、塑封/陶封、终测</text>

  <path class="arrow" d="M960 389 H826"/>
  <rect class="box" x="570" y="333" width="255" height="112"/>
  <text class="txt" x="612" y="373">系统级产品</text>
  <text class="sub" x="606" y="403">PCB、模组、整机集成</text>
  <text class="sub" x="606" y="427">可靠性与应用验证</text>

  <rect x="275" y="306" width="220" height="160" fill="#ffffff" stroke="#94a3b8" stroke-width="2" rx="14"/>
  <text class="txt" x="310" y="345">晶圆厂循环</text>
  <text class="sub" x="305" y="376">1. 薄膜沉积/外延</text>
  <text class="sub" x="305" y="401">2. 光刻图形定义</text>
  <text class="sub" x="305" y="426">3. 刻蚀/离子注入/CMP</text>
  <text class="sub" x="305" y="451">4. 清洗、量测、反馈</text>
  <path class="arrow" d="M385 306 C385 282, 385 270, 385 256"/>
</svg>
